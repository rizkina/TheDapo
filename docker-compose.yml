version: '3.8'
services:
  app:
    image: rizkinug/thedapo:latest
    container_name: dapo-app
    restart: unless-stopped
    tty: true
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dapo-network

  web:
    image: nginx:alpine
    container_name: dapo-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app-code:/var/www
    volumes_from:
      - app
    networks:
      - dapo-network

  db:
    image: postgres:16-alpine
    container_name: dapo-db
    environment:
      POSTGRES_DB: db_dapo_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: GunakanPasswordYangSangatKuat123!
    volumes:
      - ./db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_dapo_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dapo-network

  redis:
    image: redis:alpine
    container_name: dapo-redis
    restart: unless-stopped
    networks:
      - dapo-network

  worker:
    image: rizkinug/thedapo:latest
    container_name: dapo-worker
    restart: unless-stopped
    command: php artisan queue:work --queue=default --sleep=3 --tries=3 --timeout=1200
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - app-code:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
      - redis
      - db
    networks:
      - dapo-network

networks:
  dapo-network:
    driver: bridge

volumes:
  app-code:
